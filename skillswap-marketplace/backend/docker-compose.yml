# docker-compose.yml — Skill Exchange Backend (local dev)
version: '3.9'

services:
  # ── Backend API ──────────────────────────────────────
  api:
    build:
      context: .
      target: runner
    container_name: skill-exchange-api
    ports:
      - '5000:5000'
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/skill-exchange
      - REDIS_HOST=redis
      - BULL_REDIS_HOST=redis
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - app-network

  # ── MongoDB ──────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: skill-exchange-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: skill-exchange-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ── Nginx load balancer (optional, for scaling demo) ──
  nginx:
    image: nginx:alpine
    container_name: skill-exchange-nginx
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - app-network
    profiles:
      - lb  # only starts with: docker-compose --profile lb up

volumes:
  mongo_data:
  redis_data:

networks:
  app-network:
    driver: bridge
