# nginx/nginx.conf  —  Load balancer for multiple API instances
# Usage: docker-compose --profile lb up --scale api=3

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  upstream skill_exchange_api {
    least_conn;
    server api:5000 weight=1 max_fails=3 fail_timeout=30s;
    # When scaling: docker-compose up --scale api=3
    # Nginx auto-discovers all api containers via DNS
    keepalive 32;
  }

  # Rate limiting at Nginx level
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  limit_conn_zone $binary_remote_addr zone=conn:10m;

  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Gzip
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1000;

    location /api/ {
      limit_req zone=api burst=40 nodelay;
      limit_conn conn 20;

      proxy_pass http://skill_exchange_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
    }

    location /health {
      proxy_pass http://skill_exchange_api/health;
      access_log off;
    }

    # Socket.io
    location /socket.io/ {
      proxy_pass http://skill_exchange_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400;
    }
  }
}
